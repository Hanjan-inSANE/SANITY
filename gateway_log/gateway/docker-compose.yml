# ===================================================================
# 6. LLM Gateway 배치 — LiteLLM 프록시 + Postgres
# 실행:  docker compose --env-file .env up -d
# 확인(V-GW-0): curl -f http://localhost:4000/health/liveliness
# ===================================================================

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]   # 이미지 entrypoint가 litellm이라는 전제. V-GW-0로 확인
    ports: ["4000:4000"]
    environment:
      SANITY_LITELLM_MASTER_KEY: ${SANITY_LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://litellm:litellm@litellm-db:5432/litellm
      # ↓ 진짜 프로바이더 키는 "프록시 컨테이너"에만 존재한다 (에이전트엔 절대 X)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    volumes: ["./config.yaml:/app/config.yaml:ro"]
    depends_on:
      litellm-db: { condition: service_healthy }
    healthcheck:                                   # V-GW-0: 창구가 살아있나
      # curl이 이미지에 없을 수 있어(B4 수정) 파이썬으로 확인 — LiteLLM 이미지엔 python이 있음
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  litellm-db:
    image: postgres:17
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes: ["litellm_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  litellm_pg: {}
